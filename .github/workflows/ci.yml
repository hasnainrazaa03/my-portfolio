name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # Node 22 LTS — matches the runtime Vercel uses for serverless
          # functions and avoids the Node 20 deprecation warning on GHA.
          node-version: '22'
          cache: 'npm'

      # vercel.json no longer needs --legacy-peer-deps (v1.3.0); mirror that.
      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Build
        run: npm run build
