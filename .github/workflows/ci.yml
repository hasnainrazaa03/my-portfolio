name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # Node 22 LTS — matches the runtime Vercel uses for serverless
          # functions and avoids the Node 20 deprecation warning on GHA.
          node-version: '22'
          cache: 'npm'

      # vercel.json no longer needs --legacy-peer-deps (v1.3.0); mirror that.
      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Build
        run: npm run build

  # OSV scanner: cross-references our lockfile against the OSV vulnerability
  # DB. Runs in parallel with the main job and is non-blocking for now
  # (continue-on-error) so we can review findings before tightening.
  osv-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Run OSV scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --lockfile=./package-lock.json
            --format=table
