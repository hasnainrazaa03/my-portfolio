# Dependabot keeps npm + GitHub Action dependencies fresh.
# Conservative weekly cadence to avoid PR noise on a personal repo.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    versioning-strategy: "increase-if-necessary"
    groups:
      # Cluster related deps so one PR upgrades them together.
      react:
        patterns: ["react", "react-dom", "react-router-dom"]
      three:
        patterns: ["three", "@react-three/*"]
      testing:
        patterns: ["vitest", "@vitest/*", "@testing-library/*", "jsdom"]
      eslint:
        patterns: ["eslint", "eslint-*", "@eslint/*"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
    commit-message:
      prefix: "chore(ci)"
