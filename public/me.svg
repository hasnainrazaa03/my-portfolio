<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Hasnain Raza monogram">
  <defs>
    <radialGradient id="space" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#0b2a2e"/>
      <stop offset="55%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#030014"/>
    </radialGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="55%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#7042f8"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7042f8" stop-opacity="0.5"/>
    </linearGradient>
    <clipPath id="circle"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>

  <g clip-path="url(#circle)">
    <rect width="200" height="200" fill="url(#space)"/>

    <!-- starfield -->
    <g fill="#ffffff">
      <circle cx="34" cy="42" r="1.3" opacity="0.8"/>
      <circle cx="158" cy="36" r="1" opacity="0.6"/>
      <circle cx="170" cy="120" r="1.4" opacity="0.7"/>
      <circle cx="28" cy="140" r="1" opacity="0.6"/>
      <circle cx="120" cy="170" r="1.2" opacity="0.7"/>
      <circle cx="60" cy="168" r="0.9" opacity="0.5"/>
      <circle cx="146" cy="160" r="1" opacity="0.6"/>
      <circle cx="50" cy="72" r="0.9" opacity="0.5"/>
    </g>

    <!-- orbital rings -->
    <g fill="none" stroke="url(#ring)">
      <ellipse cx="100" cy="100" rx="78" ry="30" stroke-width="2" opacity="0.55" transform="rotate(-22 100 100)"/>
      <ellipse cx="100" cy="100" rx="84" ry="46" stroke-width="1.5" opacity="0.35" transform="rotate(28 100 100)"/>
      <circle cx="178" cy="86" r="3" fill="#2DD4BF" stroke="none"/>
      <circle cx="30" cy="118" r="2.4" fill="#7042f8" stroke="none"/>
    </g>

    <!-- monogram -->
    <text x="100" y="100" text-anchor="middle" dominant-baseline="central"
      font-family="'Helvetica Neue', Arial, sans-serif" font-size="74" font-weight="700"
      letter-spacing="-3" fill="url(#mono)">HR</text>
  </g>

  <!-- rim -->
  <circle cx="100" cy="100" r="99" fill="none" stroke="#2DD4BF" stroke-opacity="0.25" stroke-width="2"/>
</svg>
